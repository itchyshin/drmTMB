# DISABLED STUB — Phase 18 simulation grid
#
# This workflow previously ran drmTMB simulation / coverage / power campaigns on GitHub
# Actions. It is DISABLED under decision D-50 (2026-07-12):
#
#   * Simulation / recovery / power / coverage campaigns run on **Totoro** (the 384-core
#     lab server) or the **DRAC** clusters (SLURM job arrays) — never on GitHub Actions.
#   * Campaign outputs stay **local**. They are never stored as Actions artifacts: the
#     Actions artifact store has a hard ~2 GB/month cap, which drmTMB (4,632 artifacts)
#     and gllvmTMB (9,534) had already nearly filled.
#   * GitHub Actions is for **package checks + docs only**, with short artifact retention.
#
# The campaign task list that used to live here (first_wave_summary, interval_heavy_summary,
# the per-family recovery/coverage cells, ...) is documented with the simulation code and in
# issue #59, which now records the Totoro/DRAC execution plan. Restoring compute here would
# re-introduce the D-50 conflict — don't.
#
# Kept as a stub rather than deleted so the history and the reason stay discoverable.

name: phase18-simulation-grid (disabled — D-50)

on:
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Explain why this workflow is disabled
        run: |
          echo "phase18-simulation-grid is DISABLED under decision D-50."
          echo "Simulation campaigns run on Totoro or DRAC, not on GitHub Actions."
          echo "Campaign outputs stay local and are never stored as Actions artifacts."
          echo "GitHub Actions here is for package checks + docs only."
          echo "See issue #59 for the Totoro/DRAC execution plan."
