on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

name: R-CMD-check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Routine runs (pull_request, push to main) check Linux only to keep CI cheap.
  # The full ubuntu + macOS + windows matrix runs only for release tags (v*) and
  # on demand via workflow_dispatch -- e.g. before a CRAN submission, or to
  # exercise cross-OS portability of compiled TMB code on a specific branch.
  os-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          FULL="${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}"
          if [ "$FULL" = "true" ]; then
            echo 'matrix={"config":[{"os":"ubuntu-latest","r":"release"},{"os":"macos-latest","r":"release"},{"os":"windows-latest","r":"release"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"config":[{"os":"ubuntu-latest","r":"release"}]}' >> "$GITHUB_OUTPUT"
          fi

  R-CMD-check:
    needs: os-matrix
    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 45

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.os-matrix.outputs.matrix) }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Validate generated capability ledger
        if: runner.os == 'Linux'
        run: |
          python3 tools/capability_ledger.py --check
          python3 -m unittest tools/tests/test_capability_ledger.py
          Rscript --no-init-file tools/check-capability-runtime.R

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
