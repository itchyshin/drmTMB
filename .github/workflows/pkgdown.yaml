on:
  workflow_run:
    workflows: ["R-CMD-check"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pkgdown
  cancel-in-progress: true

jobs:
  pkgdown:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/configure-pages@v6.0.0

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Fix favicon MIME markup
        run: Rscript tools/fix-pkgdown-favicon-mime.R pkgdown-site

      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: pkgdown-site

  deploy:
    if: ${{ github.event_name == 'workflow_run' || github.ref_name == 'main' || github.ref_name == 'master' }}
    needs: pkgdown
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
