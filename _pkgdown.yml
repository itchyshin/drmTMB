url: https://itchyshin.github.io/drmTMB/
destination: pkgdown-site
template:
  bootstrap: 5
  bootswatch: flatly
  includes:
    before_navbar: '<span class="drmtmb-version-note">0.1.1 preview release</span>'
  bslib:
    primary: "#0f7887"
    headings-color: "#112638"
    link-color: "#0f7887"
  opengraph:
    image:
      src: man/figures/drmTMB-logo.png
      alt: "drmTMB hex logo"

development:
  mode: auto

navbar:
  structure:
    left: [intro, reference, model_guides, tutorials, developer, news]
    right: [search, github]
  components:
    model_guides:
      text: Model Guides
      menu:
        - text: What can I fit today?
          href: articles/model-map.html
        - text: Which scale are you modelling?
          href: articles/which-scale.html
        - text: Choosing response families
          href: articles/distribution-families.html
        - text: Checking and using fitted models
          href: articles/model-workflow.html
        - text: Working with large data
          href: articles/large-data.html
    tutorials:
      text: Tutorials
      menu:
        - text: Getting started
          href: articles/drmTMB.html
        - text: When variance carries signal
          href: articles/location-scale.html
        - text: Robust continuous responses
          href: articles/robust-student.html
        - text: Changing residual coupling with rho12
          href: articles/bivariate-coscale.html
        - text: Mean effects and residual heterogeneity
          href: articles/meta-analysis.html
        - text: Structured dependence
          href: articles/phylogenetic-spatial.html
    developer:
      text: Developer Notes
      menu:
        - text: Formula grammar
          href: articles/formula-grammar.html
        - text: Adding families
          href: articles/adding-families.html
        - text: Testing likelihoods
          href: articles/testing-likelihoods.html
        - text: Implemented source map
          href: articles/source-map.html

reference:
  - title: Package
    contents:
      - drmTMB-package
  - title: Model specification
    desc: Formula constructors and family objects.
    contents:
      - drm_formula
      - bf
      - meta_known_V
      - meta_vcov_bivariate
      - beta
      - beta_binomial
      - cumulative_logit
      - student
      - lognormal
      - nbinom2
      - truncated_nbinom2
      - biv_gaussian
  - title: Structured-effect markers
    desc: Phylogenetic and planned spatial structured covariance terms.
    contents:
      - gr
      - phylo
      - spatial
  - title: Family internals
    desc: Family constructor helpers.
    contents:
      - starts_with("drm_family")
      - ends_with("_family")
  - title: Model fitting
    desc: Fit, inspect, predict, and simulate distributional models.
    contents:
      - starts_with("drmTMB")
      - drm_control
      - check_drm
      - confint.drmTMB
      - profile_targets
      - corpairs
      - fitted.drmTMB
      - fixef
      - model-fit-extractors
      - marginal_parameters
      - predict_parameters
      - predict.drmTMB
      - ranef
      - residuals.drmTMB
      - rho12
      - sigma.drmTMB
      - simulate.drmTMB
      - summary.drmTMB
      - weights.drmTMB

articles:
  - title: Getting Started
    contents:
      - drmTMB
  - title: Model Guides
    contents:
      - model-map
      - which-scale
      - distribution-families
      - model-workflow
      - large-data
  - title: Tutorials
    contents:
      - location-scale
      - robust-student
      - meta-analysis
      - bivariate-coscale
      - phylogenetic-spatial
  - title: Developer Notes
    contents:
      - formula-grammar
      - adding-families
      - testing-likelihoods
      - source-map
