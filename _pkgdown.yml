url: https://itchyshin.github.io/drmTMB/
destination: pkgdown-site
template:
  bootstrap: 5
  bootswatch: flatly
  includes:
    before_navbar: '<span class="drmtmb-version-note">0.1.2 preview release</span>'
  bslib:
    primary: "#0f7887"
    headings-color: "#112638"
    link-color: "#0f7887"
  opengraph:
    image:
      src: man/figures/drmTMB-logo.png
      alt: "drmTMB hex logo"

development:
  mode: auto

navbar:
  structure:
    left: [intro, reference, model_guides, tutorials, validation, developer, news]
    right: [search, github]
  components:
    model_guides:
      text: Model Guides
      menu:
        - text: What can I fit today?
          href: articles/model-map.html
        - text: Which scale are you modelling?
          href: articles/which-scale.html
        - text: Choosing response families
          href: articles/distribution-families.html
        - text: Checking and using fitted models
          href: articles/model-workflow.html
        - text: Improving convergence
          href: articles/convergence.html
        - text: Working with large data
          href: articles/large-data.html
    tutorials:
      text: Tutorials
      menu:
        - text: Getting started
          href: articles/drmTMB.html
        - text: When variance carries signal
          href: articles/location-scale.html
        - text: Robust continuous responses
          href: articles/robust-student.html
        - text: Count abundance and extra zeros
          href: articles/count-nbinom2.html
        - text: Figure gallery
          href: articles/figure-gallery.html
        - text: Proportions and success rates
          href: articles/proportion-beta-binomial.html
        - text: Changing residual coupling with rho12
          href: articles/bivariate-coscale.html
        - text: Mean effects and residual heterogeneity
          href: articles/meta-analysis.html
        - text: Structural dependence
          href: articles/phylogenetic-spatial.html
    validation:
      text: Simulation & Comparison
      menu:
        - text: Testing likelihoods and comparators
          href: articles/testing-likelihoods.html
        - text: Simulation plot grammar
          href: articles/simulation-plot-grammar.html
    developer:
      text: Developer Notes
      menu:
        - text: Formula grammar
          href: articles/formula-grammar.html
        - text: Adding families
          href: articles/adding-families.html
        - text: Implemented source map
          href: articles/source-map.html

reference:
  - title: Package
    contents:
      - drmTMB-package
  - title: Model specification
    desc: Formula constructors and family objects.
    contents:
      - drm_formula
      - bf
      - meta_V
      - meta_known_V
      - meta_vcov_bivariate
      - beta
      - beta_binomial
      - cumulative_logit
      - student
      - lognormal
      - nbinom2
      - truncated_nbinom2
      - biv_gaussian
  - title: Structured-effect markers
    desc: Random-effect scale, structured covariance, and latent-correlation formula syntax.
    contents:
      - random_effect_scale_formulas
      - animal
      - phylo
      - spatial
      - relmat
      - corpair
  - title: Reserved marker internals
    desc: Older reserved formula markers kept out of the main reader path.
    contents:
      - gr
  - title: Family internals
    desc: Family constructor helpers.
    contents:
      - starts_with("drm_family")
      - ends_with("_family")
  - title: Model fitting and post-fit tools
    desc: Fit, diagnose, summarize, predict, and simulate distributional models.
    contents:
      - starts_with("drmTMB")
      - drm_control
      - check_drm
      - confint.drmTMB
      - profile_targets
      - corpairs
      - fitted.drmTMB
      - fixef
      - model-fit-extractors
      - marginal_parameters
      - prediction_grid
      - predict_parameters
      - predict.drmTMB
      - ranef
      - residuals.drmTMB
      - rho12
      - sigma.drmTMB
      - simulate.drmTMB
      - summary.drmTMB
      - weights.drmTMB
  - title: Visualization
    desc: Optional plotting helpers for post-fit tables. Exported plotting functions appear here.
    contents:
      - plot_corpairs
      - plot_parameter_surface

articles:
  - title: Getting Started
    contents:
      - drmTMB
  - title: Model Guides
    contents:
      - model-map
      - which-scale
      - distribution-families
      - model-workflow
      - convergence
      - large-data
  - title: Tutorials
    contents:
      - location-scale
      - robust-student
      - count-nbinom2
      - figure-gallery
      - proportion-beta-binomial
      - meta-analysis
      - bivariate-coscale
      - phylogenetic-spatial
  - title: Simulation & Comparison
    contents:
      - testing-likelihoods
      - simulation-plot-grammar
  - title: Developer Notes
    contents:
      - formula-grammar
      - adding-families
      - source-map
