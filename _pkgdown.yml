url: https://itchyshin.github.io/drmTMB/
destination: pkgdown-site
template:
  bootstrap: 5
  bootswatch: flatly
  includes:
    before_navbar: '<span class="drmtmb-version-note">0.1.3.9000 development</span>'
  bslib:
    primary: "#0f7887"
    headings-color: "#112638"
    link-color: "#0f7887"
  opengraph:
    image:
      src: man/figures/drmTMB-logo.png
      alt: "drmTMB hex logo"

development:
  mode: release

navbar:
  structure:
    left: [intro, reference, model_guides, tutorials, diagnostics, developer, news]
    right: [search, github]
  components:
    model_guides:
      text: Model Guides
      menu:
        - text: What can I fit today?
          href: articles/model-map.html
        - text: Which scale are you modelling?
          href: articles/which-scale.html
        - text: Choosing response families
          href: articles/distribution-families.html
        - text: Checking and using fitted models
          href: articles/model-workflow.html
        - text: Improving convergence
          href: articles/convergence.html
        - text: Working with large data
          href: articles/large-data.html
    tutorials:
      text: Tutorials
      menu:
        - text: Getting started
          href: articles/drmTMB.html
        - text: When variance carries signal
          href: articles/location-scale.html
        - text: Robust continuous responses
          href: articles/robust-student.html
        - text: Count abundance and extra zeros
          href: articles/count-nbinom2.html
        - text: Proportions and success rates
          href: articles/proportion-beta-binomial.html
        - text: Changing residual coupling with rho12
          href: articles/bivariate-coscale.html
        - text: Mean effects and residual heterogeneity
          href: articles/meta-analysis.html
        - text: Structural dependence overview
          href: articles/structural-dependence.html
        - text: Animal models and relatedness
          href: articles/animal-models.html
        - text: Phylogenetic structured effects
          href: articles/phylogenetic-models.html
        - text: Coordinate-spatial structured effects
          href: articles/spatial-models.html
        - text: Known-matrix relmat models
          href: articles/relmat-known-matrices.html
        - text: Structural dependence details
          href: articles/phylogenetic-spatial.html
    diagnostics:
      text: Diagnostics & Validation
      menu:
        - text: Figure gallery
          href: articles/figure-gallery.html
        - text: Implementation map
          href: articles/implementation-map.html
        - text: Testing likelihoods and comparators
          href: articles/testing-likelihoods.html
        - text: Simulation plot grammar
          href: articles/simulation-plot-grammar.html
    developer:
      text: Developer Notes
      menu:
        - text: Formula grammar
          href: articles/formula-grammar.html
        - text: Adding families
          href: articles/adding-families.html
        - text: Implemented source map
          href: articles/source-map.html

reference:
  - title: Package
    contents:
      - drmTMB-package
  - title: Model specification
    desc: Formula constructors, family objects, and status-marked model syntax.
    contents:
      - drm_formula
      - bf
      - meta_V
      - meta_vcov_bivariate
      - beta
      - zero_one_beta
      - beta_binomial
      - cumulative_logit
      - student
      - lognormal
      - nbinom2
      - truncated_nbinom2
      - biv_gaussian
  - title: Structured-effect markers
    desc: Fitted and planned random-effect scale, structured covariance, and latent-correlation formula syntax. Each topic names its current status.
    contents:
      - random_effect_scale_formulas
      - animal
      - phylo
      - spatial
      - relmat
      - corpair
  - title: Deprecated marker internals
    desc: Older deprecated formula markers kept out of the main reader path.
    contents:
      - meta_known_V
      - gr
  - title: Model fitting and post-fit tools
    desc: Fit, diagnose, summarize, predict, and simulate distributional models.
    contents:
      - starts_with("drmTMB")
      - drm_control
      - check_drm
      - confint.drmTMB
      - profile_targets
      - profile.drmTMB
      - corpairs
      - fitted.drmTMB
      - fixef
      - model-fit-extractors
      - marginal_parameters
      - prediction_grid
      - predict_parameters
      - predict.drmTMB
      - ranef
      - residuals.drmTMB
      - rho12
      - sigma.drmTMB
      - simulate.drmTMB
      - summary.drmTMB
      - weights.drmTMB
  - title: Visualization
    desc: Optional plotting helpers for post-fit tables. Exported plotting functions appear here.
    contents:
      - plot.profile.drmTMB
      - plot_corpairs
      - plot_parameter_surface

articles:
  - title: Getting Started
    contents:
      - drmTMB
  - title: Start Here
    contents:
      - model-map
      - model-workflow
  - title: Choose Your Model
    contents:
      - which-scale
      - distribution-families
      - location-scale
      - bivariate-coscale
      - meta-analysis
  - title: Applied Family Tutorials
    contents:
      - robust-student
      - count-nbinom2
      - proportion-beta-binomial
  - title: Structured Dependence
    contents:
      - structural-dependence
      - animal-models
      - phylogenetic-models
      - spatial-models
      - relmat-known-matrices
      - phylogenetic-spatial
  - title: Inference, Diagnostics, and Figures
    contents:
      - convergence
      - large-data
      - figure-gallery
  - title: Simulation and Validation
    contents:
      - implementation-map
      - testing-likelihoods
      - simulation-plot-grammar
  - title: Developer Notes
    contents:
      - formula-grammar
      - adding-families
      - source-map
